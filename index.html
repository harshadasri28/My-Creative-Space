<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Vibe Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <ul>
            <li><a href="#introduction">Introduction</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#story">Personal Story</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="introduction" class="section">
        <div class="content">
            <h1>Welcome to My Creative Space</h1>
            <p>Explore a world of calm, creativity, and inspiration.</p>
        </div>
    </section>

    <section id="gallery" class="section">
        <div class="content">
            <h2>Gallery</h2>
            <div class="gallery-grid">
                <div class="card"><img src="https://via.placeholder.com/300" alt="Creative Work 1"></div>
                <div class="card"><img src="https://via.placeholder.com/300" alt="Creative Work 2"></div>
                <div class="card"><img src="https://via.placeholder.com/300" alt="Creative Work 3"></div>
                <div class="card"><img src="https://via.placeholder.com/300" alt="Creative Work 4"></div>
            </div>
        </div>
    </section>

    <section id="story" class="section">
        <div class="content">
            <h2>My Personal Story</h2>
            <p>This is where I share my journey, experiences, and what inspires me.</p>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="content">
            <h2>Contact Me</h2>
            <form>
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
